; =============================================================================
; Instagram Crawler — Configuration
; =============================================================================
; This file uses the standard ConfigParser INI format.
; Copy this file to config.ini and adjust values for your environment.
;
; Sections:
;   [service]        External service URLs (token management, Tor)
;   [beanstalk]      Beanstalkd queue connection
;   [beanstalk_tube] Tube (queue) names per job type
;   [redis]          Redis cache connection
;   [ssdb]           SSDB dedup storage connection (Redis-protocol compatible)
;   [ssdb_keys]      Hash key names used for SSDB dedup
;   [kafka]          Kafka output connection and topics
;   [nsq]            NSQ output connection and topic
;   [sentry]         Sentry DSN for error reporting
;   [external_proxy] External proxy provider API endpoints and tokens
;   [proxy]          Static proxy list and proxy service URL
;   [count]          Crawl limits and retry counts
;   [log]            Log file path
; =============================================================================

; -----------------------------------------------------------------------------
; External service URLs
; -----------------------------------------------------------------------------
[service]
token_management = http://localhost:9090
tor_server = localhost

; -----------------------------------------------------------------------------
; Beanstalkd queue connection
; -----------------------------------------------------------------------------
[beanstalk]
host = localhost
port = 11300

; -----------------------------------------------------------------------------
; Beanstalk tube names — each job type goes into its own tube
; -----------------------------------------------------------------------------
[beanstalk_tube]
post = sc_instagram_post
comment = sc_instagram_comment
profile = sc_instagram_profile
download = socmed-downloader

; -----------------------------------------------------------------------------
; Redis cache (used for comment dedup and general caching)
; -----------------------------------------------------------------------------
[redis]
host = localhost
port = 6379
db = 0
password =

; -----------------------------------------------------------------------------
; SSDB dedup storage (Redis-protocol, used for post/profile dedup)
; -----------------------------------------------------------------------------
[ssdb]
host = localhost
port = 8888
password =

; -----------------------------------------------------------------------------
; SSDB hash keys — one per entity type for deduplication
; -----------------------------------------------------------------------------
[ssdb_keys]
hash_keys_post = sc-instagram-post
hash_keys_comment = sc-instagram-comment
hash_keys_account = sc-instagram-account
hash_keys_error = sc-instagram-error

; -----------------------------------------------------------------------------
; Kafka output — bootstrap servers and topic names
; -----------------------------------------------------------------------------
[kafka]
bootstrap_servers = localhost:9092
topic_post = sc-instagram-post
topic_comment = sc-instagram-comment

; -----------------------------------------------------------------------------
; NSQ output — HTTP publish endpoint and topic
; -----------------------------------------------------------------------------
[nsq]
nsqd_http_address = localhost:4151
topic = sc_instagram

; -----------------------------------------------------------------------------
; Sentry error reporting (DSN URL, leave empty to disable)
; -----------------------------------------------------------------------------
[sentry]
dsn =

; -----------------------------------------------------------------------------
; External proxy providers — API endpoints and tokens
;   webshare_token: API token for proxy.webshare.io
; -----------------------------------------------------------------------------
[external_proxy]
get_proxy_list =
pub_proxy =
webshare_token =

; -----------------------------------------------------------------------------
; Static proxy configuration
;   static_proxies: comma-separated proxy URLs (http://user:pass@host:port)
;   iproxyal_url: URL for iproxyal proxy service
; -----------------------------------------------------------------------------
[proxy]
static_proxies =
iproxyal_url =

; -----------------------------------------------------------------------------
; Crawl limits and retry behaviour
;   max_post:      maximum posts to fetch per job
;   max_days:      maximum age of posts in days
;   retry:         number of retry attempts on failure
;   scroll:        scroll depth for pagination
;   default_until: default "until" lookback in days
; -----------------------------------------------------------------------------
[count]
max_post = 30
max_days = 3
retry = 3
scroll = 5
default_until = 30

; -----------------------------------------------------------------------------
; Logging
; -----------------------------------------------------------------------------
[log]
path = /tmp/log/instagram_crawler
